<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login — Bolão Copa 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary:    #020F2A;
    --bg-card:       #0D1E3D;
    --accent:        #4A90D9;
    --accent-light:  #7BB8F0;
    --border:        rgba(74,144,217,0.18);
    --border-active: rgba(74,144,217,0.50);
    --text-primary:  #FFFFFF;
    --text-muted:    rgba(255,255,255,0.40);
    --success:       #4ade80;
  }

  html, body {
    height: 100%;
    background: var(--bg-primary);
    font-family: 'Inter', sans-serif;
    color: var(--text-primary);
  }

  /* ── background grid texture ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      repeating-linear-gradient(90deg, rgba(255,255,255,0.025) 0, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 80px),
      repeating-linear-gradient(0deg,  rgba(255,255,255,0.025) 0, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 80px);
    pointer-events: none;
    z-index: 0;
  }

  /* ── glow behind card ── */
  body::after {
    content: '';
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -60%);
    width: 600px; height: 400px;
    background: radial-gradient(ellipse, rgba(74,144,217,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px;
  }

  /* ── logo ── */
  .logo {
    display: flex; flex-direction: column; align-items: center;
    margin-bottom: 32px;
  }
  .logo-mark {
    display: flex; align-items: flex-end; gap: 2px;
    line-height: 1;
  }
  .logo-26 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 64px;
    color: white;
    letter-spacing: -3px;
    line-height: 1;
  }
  .logo-trophy {
    font-size: 38px;
    margin-bottom: 4px;
    margin-left: -6px;
    filter: drop-shadow(0 0 12px rgba(255,215,0,0.4));
  }
  .logo-fifa {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    color: white;
    letter-spacing: 4px;
    margin-top: 4px;
  }
  .logo-wc {
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 2px;
    font-weight: 500;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .logo-bolao {
    margin-top: 10px;
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.5px;
  }

  /* ── card ── */
  .card {
    width: 100%;
    max-width: 400px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    position: relative;
  }
  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, #4A90D9, #7BB8F0, #4A90D9);
  }

  .card-tabs {
    display: grid; grid-template-columns: 1fr 1fr;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 14px;
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: all 0.2s;
    text-decoration: none;
    display: block;
  }
  .tab.active {
    color: white;
    background: rgba(74,144,217,0.08);
    border-bottom: 2px solid var(--accent);
  }
  .tab:hover:not(.active) { color: rgba(255,255,255,0.7); }

  .card-body { padding: 28px 28px 24px; }

  .card-title {
    font-size: 20px;
    font-weight: 700;
    color: white;
    margin-bottom: 6px;
  }
  .card-sub {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 24px;
    line-height: 1.5;
  }

  /* ── form ── */
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 14px;
    font-size: 14px;
    color: white;
    font-family: 'Inter', sans-serif;
    transition: border-color 0.2s;
    outline: none;
  }
  .field input:focus {
    border-color: var(--border-active);
    background: rgba(74,144,217,0.06);
  }
  .field input::placeholder { color: rgba(255,255,255,0.2); }

  .forgot {
    display: block;
    text-align: right;
    font-size: 11px;
    color: var(--accent-light);
    text-decoration: none;
    margin-top: -10px;
    margin-bottom: 20px;
  }
  .forgot:hover { text-decoration: underline; }

  .btn-primary {
    width: 100%;
    background: linear-gradient(90deg, #4A90D9, #1a5ca8);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 13px;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: opacity 0.2s;
  }
  .btn-primary:hover { opacity: 0.9; }

  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 20px 0;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1;
    height: 1px; background: var(--border);
  }
  .divider span { font-size: 11px; color: var(--text-muted); }

  .register-link {
    text-align: center;
    font-size: 13px;
    color: var(--text-muted);
  }
  .register-link a {
    color: var(--accent-light);
    text-decoration: none;
    font-weight: 600;
  }
  .register-link a:hover { text-decoration: underline; }

  /* ── footer ── */
  .page-footer {
    margin-top: 24px;
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    text-align: center;
  }
</style>
</head>
<body>
<div class="page">

  <div class="logo">
    <div class="logo-mark">
      <span class="logo-26">2</span>
      <span class="logo-trophy">🏆</span>
      <span class="logo-26">6</span>
    </div>
    <div class="logo-fifa">FIFA</div>
    <div class="logo-wc">World Cup™ 2026</div>
    <div class="logo-bolao">Bolão Oficial dos Amigos</div>
  </div>

  <div class="card">
    <div class="card-tabs">
      <a href="#" class="tab active">Entrar</a>
      <a href="02-register.html" class="tab">Cadastrar</a>
    </div>
    <div class="card-body">
      <div class="card-title">Bem-vindo de volta</div>
      <div class="card-sub">Entre com seu email e senha pra acessar seus palpites.</div>

      <form>
        <div class="field">
          <label>Email</label>
          <input type="email" placeholder="seu@email.com" autocomplete="email" />
        </div>
        <div class="field">
          <label>Senha</label>
          <input type="password" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <a href="#" class="forgot">Esqueci minha senha</a>
        <button type="submit" class="btn-primary">Entrar</button>
      </form>

      <div class="divider"><span>ou</span></div>
      <div class="register-link">
        Ainda não tem conta? <a href="02-register.html">Cadastre-se</a>
      </div>
    </div>
  </div>

  <div class="page-footer">FIFA World Cup 2026™ · EUA · Canadá · México</div>
</div>
</body>
</html>
