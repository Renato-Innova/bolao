<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cadastro — Bolão Copa 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #020F2A; --bg-card: #0D1E3D;
    --accent: #4A90D9; --accent-light: #7BB8F0;
    --border: rgba(74,144,217,0.18); --border-active: rgba(74,144,217,0.50);
    --text-primary: #FFFFFF; --text-muted: rgba(255,255,255,0.40);
  }
  html, body { height: 100%; background: var(--bg-primary); font-family: 'Inter', sans-serif; color: var(--text-primary); }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      repeating-linear-gradient(90deg, rgba(255,255,255,0.025) 0, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 80px),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 80px);
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: ''; position: fixed;
    top: 50%; left: 50%; transform: translate(-50%, -60%);
    width: 600px; height: 400px;
    background: radial-gradient(ellipse, rgba(74,144,217,0.12) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  .page { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }

  .logo { display: flex; flex-direction: column; align-items: center; margin-bottom: 28px; }
  .logo-mark { display: flex; align-items: flex-end; gap: 2px; line-height: 1; }
  .logo-26 { font-family: 'Bebas Neue', sans-serif; font-size: 56px; color: white; letter-spacing: -3px; line-height: 1; }
  .logo-trophy { font-size: 33px; margin-bottom: 3px; margin-left: -5px; filter: drop-shadow(0 0 12px rgba(255,215,0,0.4)); }
  .logo-fifa { font-family: 'Bebas Neue', sans-serif; font-size: 12px; color: white; letter-spacing: 4px; margin-top: 3px; }
  .logo-wc { font-size: 9px; color: var(--text-muted); letter-spacing: 2px; font-weight: 500; text-transform: uppercase; }
  .logo-bolao { margin-top: 8px; font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.5); letter-spacing: 0.5px; }

  .card { width: 100%; max-width: 420px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; position: relative; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, #4A90D9, #7BB8F0, #4A90D9); }

  .card-tabs { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid var(--border); }
  .tab { padding: 14px; text-align: center; font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; text-decoration: none; display: block; transition: all 0.2s; }
  .tab.active { color: white; background: rgba(74,144,217,0.08); border-bottom: 2px solid var(--accent); }
  .tab:hover:not(.active) { color: rgba(255,255,255,0.7); }

  .card-body { padding: 24px 28px 24px; }
  .card-title { font-size: 20px; font-weight: 700; color: white; margin-bottom: 4px; }
  .card-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.5; }

  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
  .field input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 8px; padding: 11px 14px; font-size: 14px; color: white; font-family: 'Inter', sans-serif; transition: border-color 0.2s; outline: none; }
  .field input:focus { border-color: var(--border-active); background: rgba(74,144,217,0.06); }
  .field input::placeholder { color: rgba(255,255,255,0.2); }

  .field-hint { font-size: 10px; color: var(--text-muted); margin-top: 4px; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .info-box {
    background: rgba(74,144,217,0.07);
    border: 1px solid rgba(74,144,217,0.2);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 12px;
    color: var(--accent-light);
    margin-bottom: 18px;
    line-height: 1.5;
  }

  .btn-primary { width: 100%; background: linear-gradient(90deg, #4A90D9, #1a5ca8); color: white; border: none; border-radius: 8px; padding: 13px; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; cursor: pointer; font-family: 'Inter', sans-serif; transition: opacity 0.2s; margin-top: 4px; }
  .btn-primary:hover { opacity: 0.9; }

  .login-link { text-align: center; font-size: 13px; color: var(--text-muted); margin-top: 16px; }
  .login-link a { color: var(--accent-light); text-decoration: none; font-weight: 600; }
  .login-link a:hover { text-decoration: underline; }

  .page-footer { margin-top: 20px; font-size: 11px; color: rgba(255,255,255,0.2); text-align: center; }
</style>
</head>
<body>
<div class="page">
  <div class="logo">
    <div class="logo-mark">
      <span class="logo-26">2</span>
      <span class="logo-trophy">🏆</span>
      <span class="logo-26">6</span>
    </div>
    <div class="logo-fifa">FIFA</div>
    <div class="logo-wc">World Cup™ 2026</div>
    <div class="logo-bolao">Bolão Oficial dos Amigos</div>
  </div>

  <div class="card">
    <div class="card-tabs">
      <a href="01-login.html" class="tab">Entrar</a>
      <a href="#" class="tab active">Cadastrar</a>
    </div>
    <div class="card-body">
      <div class="card-title">Criar conta</div>
      <div class="card-sub">Preencha seus dados pra participar do bolão.</div>

      <div class="info-box">
        Após o cadastro, crie seu palpite e ative pagando R$ 40,00 via PIX.
      </div>

      <form>
        <div class="field">
          <label>Nome completo</label>
          <input type="text" placeholder="Seu nome" autocomplete="name" />
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" placeholder="seu@email.com" autocomplete="email" />
        </div>
        <div class="field">
          <label>WhatsApp</label>
          <input type="tel" placeholder="(11) 99999-9999" />
          <div class="field-hint">Usado para contato em caso de premiação</div>
        </div>
        <div class="two-col">
          <div class="field">
            <label>Senha</label>
            <input type="password" placeholder="••••••••" autocomplete="new-password" />
          </div>
          <div class="field">
            <label>Confirmar senha</label>
            <input type="password" placeholder="••••••••" autocomplete="new-password" />
          </div>
        </div>
        <button type="submit" class="btn-primary">Criar conta</button>
      </form>

      <div class="login-link">Já tem conta? <a href="01-login.html">Entrar</a></div>
    </div>
  </div>

  <div class="page-footer">FIFA World Cup 2026™ · EUA · Canadá · México</div>
</div>
</body>
</html>
