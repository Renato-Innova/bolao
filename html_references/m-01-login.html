<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Mobile Login — Bolão Copa 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#020F2A;--card:#0D1E3D;--accent:#4A90D9;--al:#7BB8F0;--border:rgba(74,144,217,.18);--ba:rgba(74,144,217,.50);--tm:rgba(255,255,255,.45);--td:rgba(255,255,255,.25);--ok:#4ade80}
  html,body{height:100%;background:var(--bg);font-family:'Inter',sans-serif;color:#fff}
  body::before{content:'';position:fixed;inset:0;background-image:repeating-linear-gradient(90deg,rgba(255,255,255,.025) 0,rgba(255,255,255,.025) 1px,transparent 1px,transparent 60px),repeating-linear-gradient(0deg,rgba(255,255,255,.025) 0,rgba(255,255,255,.025) 1px,transparent 1px,transparent 60px);pointer-events:none;z-index:0}
  body::after{content:'';position:fixed;top:30%;left:50%;transform:translate(-50%,-50%);width:300px;height:300px;background:radial-gradient(ellipse,rgba(74,144,217,.15) 0%,transparent 70%);pointer-events:none;z-index:0}

  .page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 16px;max-width:390px;margin:0 auto}

  .logo{display:flex;flex-direction:column;align-items:center;margin-bottom:28px}
  .logo-mark{display:flex;align-items:flex-end;gap:0;line-height:1}
  .logo-26{font-family:'Bebas Neue',sans-serif;font-size:56px;color:#fff;letter-spacing:-3px;line-height:1}
  .logo-trophy{font-size:34px;margin-bottom:3px;margin-left:-4px;filter:drop-shadow(0 0 12px rgba(255,215,0,.4))}
  .logo-fifa{font-family:'Bebas Neue',sans-serif;font-size:12px;color:#fff;letter-spacing:4px;margin-top:3px}
  .logo-wc{font-size:9px;color:var(--td);letter-spacing:2px;font-weight:500;text-transform:uppercase}
  .logo-bolao{margin-top:8px;font-size:12px;font-weight:600;color:rgba(255,255,255,.5);letter-spacing:.5px}

  .card{width:100%;background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;position:relative}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#4A90D9,#7BB8F0,#4A90D9)}

  .tabs{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border)}
  .tab{padding:14px;text-align:center;font-size:13px;font-weight:600;color:var(--tm);text-transform:uppercase;letter-spacing:.5px;text-decoration:none;display:block}
  .tab.on{color:#fff;background:rgba(74,144,217,.08);border-bottom:2px solid var(--accent)}

  .body{padding:24px 20px 20px}
  .title{font-size:20px;font-weight:800;color:#fff;margin-bottom:4px}
  .sub{font-size:13px;color:var(--tm);margin-bottom:22px;line-height:1.5}

  .field{margin-bottom:14px}
  .field label{display:block;font-size:10px;font-weight:700;color:var(--td);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
  .field input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;padding:13px 14px;font-size:15px;color:#fff;font-family:'Inter',sans-serif;outline:none;-webkit-appearance:none}
  .field input:focus{border-color:var(--ba);background:rgba(74,144,217,.07)}
  .field input::placeholder{color:rgba(255,255,255,.2)}

  .forgot{display:block;text-align:right;font-size:12px;color:var(--al);text-decoration:none;margin-top:-8px;margin-bottom:20px}

  .btn{width:100%;background:linear-gradient(90deg,#4A90D9,#1a5ca8);color:#fff;border:none;border-radius:10px;padding:15px;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;cursor:pointer;font-family:'Inter',sans-serif}

  .divider{display:flex;align-items:center;gap:10px;margin:18px 0}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
  .divider span{font-size:11px;color:var(--td)}

  .reg-link{text-align:center;font-size:13px;color:var(--tm)}
  .reg-link a{color:var(--al);text-decoration:none;font-weight:700}

  .footer{margin-top:20px;font-size:10px;color:rgba(255,255,255,.2);text-align:center}
</style>
</head>
<body>
<div class="page">
  <div class="logo">
    <div class="logo-mark">
      <span class="logo-26">2</span>
      <span class="logo-trophy">🏆</span>
      <span class="logo-26">6</span>
    </div>
    <div class="logo-fifa">FIFA</div>
    <div class="logo-wc">World Cup™ 2026</div>
    <div class="logo-bolao">Bolão Oficial dos Amigos</div>
  </div>

  <div class="card">
    <div class="tabs">
      <a href="#" class="tab on">Entrar</a>
      <a href="m-02-register.html" class="tab">Cadastrar</a>
    </div>
    <div class="body">
      <div class="title">Bem-vindo</div>
      <div class="sub">Entre com seu email e senha pra acessar seus palpites.</div>
      <form>
        <div class="field">
          <label>Email</label>
          <input type="email" placeholder="seu@email.com" autocomplete="email"/>
        </div>
        <div class="field">
          <label>Senha</label>
          <input type="password" placeholder="••••••••" autocomplete="current-password"/>
        </div>
        <a href="#" class="forgot">Esqueci minha senha</a>
        <button type="submit" class="btn">Entrar</button>
      </form>
      <div class="divider"><span>ou</span></div>
      <div class="reg-link">Não tem conta? <a href="m-02-register.html">Cadastre-se</a></div>
    </div>
  </div>
  <div class="footer">FIFA World Cup 2026™ · EUA · Canadá · México</div>
</div>
</body>
</html>
