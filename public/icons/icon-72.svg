<svg xmlns="http://www.w3.org/2000/svg" width="72" height="72" viewBox="0 0 72 72">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1E3D"/>
      <stop offset="100%" stop-color="#020F2A"/>
    </linearGradient>
    <clipPath id="round">
      <rect width="72" height="72" rx="14" ry="14"/>
    </clipPath>
  </defs>
  <rect width="72" height="72" rx="14" ry="14" fill="url(#bg)"/>
  <g clip-path="url(#round)">
    <rect width="72" height="2" fill="#4A90D9"/>
    <rect x="0" y="2" width="72" height="1" fill="#7BB8F0" opacity="0.4"/>
  </g>
  <text x="36" y="33" font-family="Arial Black,Arial,sans-serif" font-size="26" font-weight="900" fill="white" text-anchor="middle" dominant-baseline="middle">26</text>
  <text x="36" y="49" font-size="12" text-anchor="middle" dominant-baseline="middle">🏆</text>
  <text x="36" y="60" font-family="Arial,sans-serif" font-size="6" font-weight="700" fill="#4A90D9" text-anchor="middle" letter-spacing="2">FIFA</text>
  <text x="36" y="68" font-family="Arial,sans-serif" font-size="5" fill="rgba(255,255,255,0.35)" text-anchor="middle">WORLD CUP™</text>
</svg>